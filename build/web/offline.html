<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a3a6b">
  <title>CivicVote Offline</title>
  <style>
    :root {
      color-scheme: light;
      --deep-blue: #1a3a6b;
      --deep-blue-dark: #11284a;
      --card-bg: rgba(255, 255, 255, 0.12);
      --text-main: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.82);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--deep-blue) 0%, var(--deep-blue-dark) 100%);
      color: var(--text-main);
    }

    .card {
      width: min(100%, 460px);
      padding: 32px 28px;
      border-radius: 24px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.14);
      font-size: 32px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--text-soft);
      font-size: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">!</div>
    <h1>You are offline</h1>
    <p>Please check your connection.</p>
  </main>
</body>
</html>
